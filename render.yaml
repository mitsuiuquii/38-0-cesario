services:
  - type: web
    name: 38-0-cesario-backend
    runtime: python
    region: ohio
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: true
      - key: CORS_ORIGINS
        value: https://seu-frontend.vercel.app
    autoDeploy: true
