services:
  - type: web
    name: 38-0-cesario-backend
    runtime: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: true
      - key: CORS_ORIGINS
        value: https://seu-frontend.vercel.app
    autoDeploy: true
